server {
    listen 80;
    server_name janilson.alfser.com.br;
    
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Compressão Gzip (otimizado)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript 
        application/x-javascript 
        application/xml 
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Cache para arquivos estáticos (com segurança)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        # Previne que arquivos estáticos sejam executados como scripts
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; img-src data:;";
        access_log off;
        log_not_found off;
    }

    # Para arquivos HTML e service worker (não cache)
    location ~* \.(html|json|xml)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate, private";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Rota principal - SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate, private";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Previne MIME type sniffing
        add_header X-Content-Type-Options "nosniff";
    }

    # Health check para o container
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        # Permite acesso sem autenticação
        satisfy any;
        allow all;
    }

    # Negar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Negar acesso a arquivos de backup
    location ~* \.(bak|old|orig|swp|log|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Segurança básica (adicionando HSTS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Política de Segurança de Conteúdo (CSP) - Ajuste conforme necessário
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Limitar métodos HTTP permitidos
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 405;
    }

    # Previne ataques de buffer overflow
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 1M;

    # Timeouts para prevenir DoS
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
}