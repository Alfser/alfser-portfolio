services:
  alfser-portfolio:
    image: alfser-portfolio:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - traefik-proxy
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-proxy"
        - traefik.constraint-label=traefik-public
        - "traefik.http.routers.portfolio.rule=Host(`janilson.alfser.com.br`)"
        - "traefik.http.routers.portfolio.entrypoints=websecure"
        - traefik.http.routers.portfolio.tls=true
        - traefik.http.routers.portfolio.tls.certresolver=le
        - "traefik.http.services.portfolio.loadbalancer.server.port=20261"
        - "traefik.http.routers.portfolio.service=portfolio"
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy